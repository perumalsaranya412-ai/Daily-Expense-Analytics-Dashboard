<!DOCTYPE html>
<html>
<head>
<title>Daily Expense Analytics Dashboard</title>
<style>
body{font-family:Arial;padding:20px;background:#f5f5f5;margin:0}
.container{max-width:600px;margin:50px auto;background:white;padding:30px;border-radius:10px;box-shadow:0 0 10px rgba(0,0,0,0.1)}
input,select,button{padding:10px;margin:5px;border-radius:5px;border:1px solid #ccc;font-size:14px}
button{background:#4CAF50;color:white;border:none;cursor:pointer}
button:hover{background:#45a049}
table{width:100%;border-collapse:collapse;margin-top:20px}
th{background:#4CAF50;color:white;padding:12px}
td{padding:10px;border:1px solid #ddd;text-align:center}
h2{text-align:center;color:#333}
h3{text-align:center;color:#4CAF50}
</style>
</head>
<body>
<div class="container">
<h2>Daily Expense Analytics Dashboard</h2>
<select id="type"><option>Expense</option><option>Income</option></select>
<input id="category" placeholder="Category" type="text">
<input id="amount" type="number" placeholder="Amount">
<button onclick="add()">Add</button>
<h3>Balance: ₹<span id="balance">0</span></h3>
<table id="table"><tr><th>Type</th><th>Category</th><th>Amount</th></tr></table>
</div>
<script>
let bal=0;
function add(){
let t=document.getElementById('type').value;
let c=document.getElementById('category').value;
let a=parseFloat(document.getElementById('amount').value);
if(!c||!a||a<=0){alert('Category and Amount enter pannu da');return;}
bal=t=='Income'?bal+a:bal-a;
document.getElementById('balance').innerText=bal;
let row=document.getElementById('table').insertRow();
row.insertCell(0).innerText=t;
row.insertCell(1).innerText=c;
row.insertCell(2).innerText=a;
document.getElementById('category').value='';
document.getElementById('amount').value='';
}
</script>
</body>
</html>
